<!DOCTYPE html>
<html>
<head>

<title>For Aditi ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffc3a0);
font-family:'Pacifico',cursive;
overflow:hidden;
text-align:center;
}

/* cartoon */

.cartoon{
width:200px;
margin-bottom:20px;
animation:floatCartoon 4s ease-in-out infinite;
}

@keyframes floatCartoon{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* glowing text */

#message{

font-size:55px;
display:none;
color:#ffd6e7;

text-shadow:
0 0 10px #ff4da6,
0 0 20px #ff4da6,
0 0 40px #ff1a8c,
0 0 60px #ff1a8c;

}

/* button */

button{

padding:16px 35px;
font-size:22px;
border:none;
border-radius:40px;
background:#ff4da6;
color:white;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.3);

}

/* floating hearts */

.heart{
position:absolute;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

/* rose petals */

.petal{
position:absolute;
font-size:24px;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

/* rose explosion */

.explosion{
position:absolute;
font-size:30px;
animation:explode 2s ease-out forwards;
}

@keyframes explode{
0%{
transform:scale(0);
opacity:1;
}
100%{
transform:scale(2) translateY(-100px);
opacity:0;
}
}

</style>

</head>

<body>

<img class="cartoon" src="https://cdn-icons-png.flaticon.com/512/833/833472.png">

<button onclick="startSurprise()">Tap for your surprise Aditi ❤️</button>

<div id="message"></div>

<script>

function startSurprise(){

document.querySelector("button").style.display="none";

roseExplosion();

typeText();

setInterval(createHeart,300);
setInterval(createPetal,500);

}

function typeText(){

const text="Happy Women's Day ❤️ Aditi 💕";

const msg=document.getElementById("message");

msg.style.display="block";

let i=0;

const typing=setInterval(()=>{

msg.innerHTML=text.substring(0,i+1);

i++;

if(i>=text.length){

clearInterval(typing);

}

},100);

}

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

}

function createPetal(){

const petal=document.createElement("div");

petal.classList.add("petal");

petal.innerHTML="🌹";

petal.style.left=Math.random()*100+"vw";

document.body.appendChild(petal);

setTimeout(()=>{

petal.remove();

},8000);

}

function roseExplosion(){

for(let i=0;i<20;i++){

const rose=document.createElement("div");

rose.classList.add("explosion");

rose.innerHTML="🌹";

rose.style.left=Math.random()*100+"vw";

rose.style.top=Math.random()*100+"vh";

document.body.appendChild(rose);

setTimeout(()=>{

rose.remove();

},2000);

}

}

</script>

</body>
</html>
