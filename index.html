<!DOCTYPE html>
<html>
<head>
<title>For Amiru ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4);
font-family:Arial;
overflow:hidden;
text-align:center;
color:white;
}

/* cartoon */
.cartoon{
width:200px;
margin-bottom:20px;
animation:floatCartoon 4s ease-in-out infinite;
}

@keyframes floatCartoon{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

/* button */

button{
padding:16px 35px;
font-size:22px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

/* message */

#message{
font-size:45px;
margin-top:20px;
white-space:nowrap;
border-right:3px solid white;
width:0;
overflow:hidden;
display:none;
}

/* hearts */

.heart{
position:absolute;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

/* rose petals */

.petal{
position:absolute;
font-size:24px;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

</style>

</head>

<body>

<img class="cartoon" src="https://cdn-icons-png.flaticon.com/512/833/833472.png">

<button onclick="startSurprise()">Tap for your surprise Amiru ❤️</button>

<div id="message">Happy Women's Day ❤️ Amiru 💕</div>

<script>

function startSurprise(){

document.querySelector("button").style.display="none";

typeText();

setInterval(createHeart,300);
setInterval(createPetal,500);

}

function typeText(){

const text="Happy Women's Day ❤️ Amiru 💕";
const msg=document.getElementById("message");

msg.style.display="block";

let i=0;

const typing=setInterval(()=>{
msg.style.width=(i+1)+"ch";
i++;

if(i>=text.length){
clearInterval(typing);
}

},100);

}

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

function createPetal(){

const petal=document.createElement("div");
petal.classList.add("petal");

petal.innerHTML="🌹";

petal.style.left=Math.random()*100+"vw";

document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},8000);

}

</script>

</body>
</html>
