<!DOCTYPE html>
<html>
<head>
<title>For Amiru ❤️</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
overflow:hidden;
text-align:center;
}

button{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:30px;
background:#ff4081;
color:white;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
font-size:55px;
color:white;
display:none;
animation:fadeIn 3s;
}

p{
font-size:35px;
color:white;
display:none;
}

@keyframes fadeIn{
0%{opacity:0; transform:scale(0.5);}
100%{opacity:1; transform:scale(1);}
}

.heart{
position:absolute;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}

}

</style>

</head>

<body>

<button onclick="showMessage()">Tap for your surprise Amiru ❤️</button>

<h1 id="msg">Happy Women's Day ❤️</h1>
<p id="msg2">My World – Amiru 💕</p>

<script>

function showMessage(){

document.querySelector("button").style.display="none";

document.getElementById("msg").style.display="block";
document.getElementById("msg2").style.display="block";

setInterval(createHeart,300);

}

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

</script>

</body>
</html>
